# docker-compose.yml
# Local development only — spins up MongoDB and Redis locally.
# Production uses MongoDB Atlas and Azure Redis Cache.
#
# Usage:
#   docker-compose up -d          # start MongoDB + Redis in background
#   docker-compose down           # stop and remove containers
#   docker-compose down -v        # stop and wipe all data

version: "3.9"

services:

  mongodb:
    image: mongo:7.0
    container_name: nextgenams-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nextgenams
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: nextgenams-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local